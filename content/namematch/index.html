---
title: "Name Match Game"
description: "Drag each name onto the slot for the number it started above, then check your answer."
---
<link rel="stylesheet" href="styles.css" />
<main class="app">
  <div class="rows" aria-live="polite">
    <div id="top-row" class="row" role="list"></div>
    <div id="bottom-row" class="row" role="list"></div>
  </div>
  <div class="controls">
    <button type="button" id="btn-start" class="btn primary">Start</button>
    <button type="button" id="btn-check" class="btn" disabled>Check</button>
    <button type="button" id="btn-reset" class="btn">Reset</button>
  </div>
  <p id="status" class="status" role="status"></p>
</main>
<script src="script.js"></script>
