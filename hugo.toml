baseURL = 'https://aaronyzhou.github.io/'
languageCode = 'en-us'
title = 'Aaron Y Zhou'
theme = 'typo'

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[taxonomies]
tag = 'tags'

[params]
description = "Aaron's Website"
showFooter = false

# Appearance settings
theme = 'auto'
colorPalette = 'default'
hideHeader = false

# Intro on main page, content is markdown
# homeIntroTitle = 'Home'
homeIntroContent = """
If you want to, I can save you

I can take you away from here

So lonely inside, so busy out there

And all you wanted was somebody who cares
"""

# Lists parameters
paginationSize = 10
listSummaries = true
listDateFormat = 'Jan 2 2006'

# Breadcrumbs
[params.breadcrumbs]
enabled = false
showCurrentPage = false
home = "Home"

# Social icons
[[params.social]]
name = "linkedin"
url = "https://www.linkedin.com/in/aaronyzhou/"

[[params.social]]
name = "github"
url = "https://github.com/aaronyzhou"

# Main menu pages
[[params.menu]]
name = "home"
url = "/"

[[params.menu]]
#name = "blog"
#url = "/blog"

# Syntax highlight on code blocks
[markup]
[markup.highlight]
style = 'algol'

[markup.goldmark.renderer]
unsafe = true